<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <title>Carrito</title>
</head>
<body>
    <style>
            body {
        background-color: #93979d;
    }
        .total-box {
        background: #E6F1FB;
        color: #0C447C;
        border-radius: 12px;
        padding: 24px;
        text-align: center;
        font-size: 2rem;
        font-weight: 500;
        margin-top: 24px;
        margin-bottom: 24px;
        width: 50%;
        margin-left: auto;
        margin-right: auto;
    }
    </style>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fs-1" href="/">Cursos de Idiomas</a>
        <div>
            <a class="nav-link text-white" href="/cart"><i class="bi bi-cart fs-1"></i></a>
        </div>
    </div>
</nav>
<div class="container mt-4">
    <h2 class=" display-5 fw-bold mb-4 ">Mi carrito</h2>
    <div id="carritoConContenido">
    <table class="table table-bordered table-hover">
        <thead class="table-dark">
            <tr>
                <th>Nombre</th>
                <th>Cantidad</th>
                <th>Precio unitario</th>
                <th>Subtotal</th>
                <th></th>
            </tr>
        </thead>
        <tbody id="bodyTabla"></tbody>
    </table>
    <div id="total"></div>
    </div>
    <div id="carritoVacio" class="text-center fs-1" style="display: none;">
    <h3 class="fs-1">Tu carrito está vacío</h3>
    <p>Agregá cursos desde <a href="/">AQUI</a></p>
    </div>
</div>
 <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
           async function mostrar_carrito() {
             try{
                const res = await fetch(`http://127.0.0.1:5000/carrito`, {method: "GET"})
                const prod = await fetch(`http://127.0.0.1:5000/productos`, {method: "GET"})
                const carrito = await res.json()
                const productos = await prod.json()
                const listaProds = document.getElementById("bodyTabla")
                const carroVacio = document.getElementById("carritoVacio")
                const carroLleno = document.getElementById("carritoConContenido")
                if(carrito.carrito.length === 0){
                    carroLleno.style.display = "none"
                    carroVacio.style.display = "block"
                }else{
                    carroLleno.style.display = "block"
                    carroVacio.style.display = "none"
                }
                listaProds.innerHTML = ""
                carrito.carrito.forEach(element => {
                    let subtotal = 0
                    const producto = productos.find(p => p.id === element.id) //recorre el array productos buscando el primer elemento que cumpla la condición que le pasás como función y lo devuelve completo
                    
                    subtotal += producto.precio * element.cantidad
                    
                    listaProds.innerHTML += `
                        <tr><td>${producto.nombre}</td>
                            <td>${element.cantidad}</td>
                            <td>${producto.precio}</td>
                            <td>${subtotal}</td>
                            <td><button class="btn btn-outline-danger btn-sm" onclick="eliminarCurso(${element.id})">X</button></td>
                        </tr>
                    `
                });

                const totalDiv = document.getElementById("total")
                totalDiv.innerHTML = `<div class="total-box">Total: $${carrito.total}</div>`
            }catch (error) {
                console.log(error)
            }
        }

        mostrar_carrito()

        async function eliminarCurso(id) {
             try{
                const res = await fetch(`http://127.0.0.1:5000/carrito`, {method: "DELETE", headers: {
                "Content-Type": "application/json"}, body: JSON.stringify({id:id})})
                mostrar_carrito()
            }catch (error) {
                console.log(error)
            }
        }
    </script>
</body>
</html>
