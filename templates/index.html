<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cursos de Idiomas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
</head>
<body>

<style>
    body {
    background-color: #93979d;
}
    .card {
        border-top: 3px solid #378ADD;
        border-radius: 12px;
        background-color: #eceef2;
    }

    .card .btn-agregar {
        background: #378ADD;
        border: none;
        border-radius: 8px;
        padding: 6px 14px;
        font-size: 2rem;
        color: #fff;
        width: 100%;
    }

    .btn-agregar:hover {
    background: #185FA5;
}


    .card-title {
    color: #444441;
    font-size: 3rem;
    font-weight: 500;
    margin-bottom: 12px;
    text-align: center;
}

.card-body {
    text-align: center;
}
.badge-precio {
    display: inline-block;
    background: #7fe08f;
    color: #0C447C;
    font-size: 2rem;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 8px;
    margin-top: 12px;
    margin-bottom: 12px;
}


</style>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fs-1" href="/">Cursos de Idiomas</a>
        <div>
            <a class="nav-link text-white" href="/cart"><i class="bi bi-cart fs-1"></i></a>
        </div>
    </div>
</nav>
    <div id="contenedor" class="row">

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        async function traerCursos() {
            try{
                const res = await fetch("http://127.0.0.1:5000/productos")
                const data = await res.json()
                const contenedor = document.getElementById("contenedor") 
                data.forEach(element => {
                        
                    contenedor.innerHTML += `
                    <div class="col-md-4 mt-3 mb-1">
                    <div class="card h-100 ">
                    <div class="card-body">
                        <h5 class="card-title">${element.nombre}</h5>
                        <img src="https://flagcdn.com/w160/${element.bandera}.png" style="width: 160px; height: 100px; object-fit: cover; display: block; margin: 0 auto 12px;">
                        <p class="badge-precio"> ${element.moneda} ${element.precio} </p>
                        <button class="btn btn-primary btn-agregar" onclick = "agregarCurso(${element.id})">Agregar al carrito</button>
                    </div>
                    </div>
                    </div>`
                    
                });
            }
            catch (error) {
            console.log(error)
        }
        }

        traerCursos()

        async function agregarCurso(id) {
             try{
                const res = await fetch(`http://127.0.0.1:5000/carrito`, {method: "POST", headers: {
                "Content-Type": "application/json"}, body: JSON.stringify({id:id, cantidad: 1})})
                const data = await res.json()

            }catch (error) {
                console.log(error)
            }
        }

       
    </script>
</body>
</html>
